/* VIDEO BACKGROUND */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

.card{
  position:relative;
  overflow:hidden;
  border-radius:15px;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.1);
}

.title{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:10px;
  text-align:center;
}
.back-btn {
  display: inline-block;
  margin-bottom: 20px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.9);
  color: #2c6bed;
  text-decoration: none;
  border-radius: 20px;
  font-weight: bold;
  transition: 0.3s;
}

.back-btn:hover {
  background: #2c6bed;
  color: white;
  transform: translateX(-5px);
}
</style>
